<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MidNightRaid WCL Toolkit</title>
    <meta
      name="description"
      content="MidNightRaid 的 Warcraft Logs 工具前端，聚焦 Boss 维度的多日志技能对比。"
    >
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body data-page="index">
    <header class="site-header">
      <div class="shell">
        <p class="eyebrow">MidNightRaid</p>
        <h1>WCL Boss 汇总工具箱</h1>
        <p class="lede">
          先抓多个职业样本，再按 Boss 汇总成同一波机制下的技能对照页，方便直接看不同玩家如何交技能。
        </p>
      </div>
    </header>

    <main class="shell page-grid">
      <aside class="sidebar card">
        <section>
          <h2>Boss 选择</h2>
          <div id="boss-nav" class="raid-nav"></div>
        </section>
        <section>
          <h2>难度</h2>
          <div id="difficulty-nav" class="raid-nav"></div>
        </section>
        <section>
          <label class="search-label" for="boss-search">搜索 Boss</label>
          <input
            id="boss-search"
            class="search-input"
            type="search"
            placeholder="输入 Boss 英文名、中文别名或 slug"
          >
        </section>
        <section>
          <label class="search-label" for="class-select">职业</label>
          <select id="class-select" class="search-input"></select>
        </section>
        <section>
          <label class="search-label" for="spec-input">专精</label>
          <input id="spec-input" class="search-input" type="text" placeholder="例如 Fire / Holy / Protection">
        </section>
        <section>
          <label class="search-label" for="metric-select">指标</label>
          <select id="metric-select" class="search-input"></select>
        </section>
      </aside>

      <section class="content-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Boss Study</p>
            <h2 id="list-title">Boss 汇总入口</h2>
          </div>
          <p id="list-summary" class="muted"></p>
        </div>

        <div id="boss-list" class="boss-grid"></div>
        <div id="empty-state" class="card empty-state hidden">
          当前还没有匹配的 Boss。先确认搜索词，或者重新选择职业和专精。
        </div>
      </section>
    </main>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
