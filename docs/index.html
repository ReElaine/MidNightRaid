<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MidNightRaid WCL 抄作业站</title>
    <meta
      name="description"
      content="通过 WCL API 抓取 Boss 关键技能时间轴与职业关键技能释放时间轴的静态前端工具。"
    >
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body data-page="index">
    <header class="site-header">
      <div class="shell">
        <p class="eyebrow">MidNightRaid x WCL</p>
        <h1>从 WCL 抄作业的时间轴站</h1>
        <p class="lede">
          选择 Boss 预设、读取 WCL 报告、锁定具体 fight，然后直接抽出 Boss 关键技能轴和团队职业关键技能轴。
        </p>
      </div>
    </header>

    <main class="shell page-grid">
      <aside class="sidebar card">
        <div id="wcl-setup" class="sidebar-stack"></div>
        <section>
          <h2>副本筛选</h2>
          <div id="raid-nav" class="raid-nav"></div>
        </section>
        <section>
          <h2>难度筛选</h2>
          <div id="difficulty-nav" class="raid-nav"></div>
        </section>
        <section>
          <label class="search-label" for="boss-search">搜索 Boss 预设</label>
          <input
            id="boss-search"
            class="search-input"
            type="search"
            placeholder="输入 Boss 名称、难度或关键词"
          >
        </section>
      </aside>

      <section class="content-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Boss Presets</p>
            <h2 id="list-title">全部 Boss 预设</h2>
          </div>
          <p id="list-summary" class="muted"></p>
        </div>

        <div id="boss-list" class="boss-grid"></div>
        <div id="empty-state" class="card empty-state hidden">
          没有找到匹配的 Boss 预设，请尝试其他关键词或切换副本筛选。
        </div>
      </section>
    </main>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
