<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MidNightRaid WCL Toolkit</title>
    <meta
      name="description"
      content="MidNightRaid 的 Warcraft Logs 工具前端，聚焦高排名公开日志与 Boss 技能时间轴。"
    >
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body data-page="index">
    <header class="site-header">
      <div class="shell">
        <p class="eyebrow">MidNightRaid</p>
        <h1>WCL 时间轴工具箱</h1>
        <p class="lede">
          先用本地脚本抓取 WCL 排名和时间轴 JSON，再在这个静态前端里查看 Boss 的高排名公开日志与关键技能轴。
        </p>
      </div>
    </header>

    <main class="shell page-grid">
      <aside class="sidebar card">
        <section>
          <h2>Boss 选择</h2>
          <div id="boss-nav" class="raid-nav"></div>
        </section>
        <section>
          <h2>难度</h2>
          <div id="difficulty-nav" class="raid-nav"></div>
        </section>
        <section>
          <label class="search-label" for="boss-search">搜索 Boss</label>
          <input
            id="boss-search"
            class="search-input"
            type="search"
            placeholder="输入 Boss 英文名、中文别名或 slug"
          >
        </section>
      </aside>

      <section class="content-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Local Rankings</p>
            <h2 id="list-title">已抓取的 WCL 排名日志</h2>
          </div>
          <p id="list-summary" class="muted"></p>
        </div>

        <div id="rankings-list" class="boss-grid"></div>
        <div id="empty-state" class="card empty-state hidden">
          当前还没有匹配的本地 rankings JSON。先运行 `npm run wcl:rankings -- "<boss>"` 或 `npm run wcl:boss -- "<boss>" 1`。
        </div>
      </section>
    </main>

    <script type="module" src="./assets/js/app.js"></script>
  </body>
</html>
